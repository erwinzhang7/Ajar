name: Ajar

options:
  bundleIdPrefix: com.github.erwinzhang7
  deploymentTarget:
    macOS: "12.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  groupSortPosition: top
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_NO_COMMON_BLOCKS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Ajar:
    type: application
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: Ajar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.erwinzhang7.Ajar
        PRODUCT_NAME: Ajar
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ajar
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Erwin Zhang. MIT-licensed."
        CODE_SIGN_ENTITLEMENTS: Ajar/Ajar.entitlements
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: AjarQuickLook
        embed: true
        codeSign: true

  AjarQuickLook:
    type: app-extension
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: AjarQuickLook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.erwinzhang7.Ajar.QuickLook
        PRODUCT_NAME: AjarQuickLook
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AjarQuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: AjarQuickLook/AjarQuickLook.entitlements
        SKIP_INSTALL: YES
