name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS build
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./scripts/bootstrap.sh

      - name: Build (Debug, macOS, ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild \
            -project Ajar.xcodeproj \
            -scheme Ajar \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
          | xcbeautify || xcodebuild \
            -project Ajar.xcodeproj \
            -scheme Ajar \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

      - name: Verify embedded .appex signature
        run: |
          APP="$(find ~/Library/Developer/Xcode/DerivedData -name Ajar.app -path '*/Build/Products/Debug/*' -print -quit)"
          echo "Found app at: $APP"
          codesign --verify --verbose=2 "$APP"
          codesign --verify --verbose=2 "$APP/Contents/PlugIns/AjarQuickLook.appex"
          /usr/libexec/PlistBuddy -c 'Print :NSExtension' \
            "$APP/Contents/PlugIns/AjarQuickLook.appex/Contents/Info.plist"
