name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist on a commit."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package and publish
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build and zip
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: ./scripts/package.sh

      - name: Read artifact metadata
        id: artifact
        run: |
          ZIP=$(ls build/Ajar-*.zip)
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Built $ZIP with sha256=$SHA"

      - name: Write release notes
        run: |
          cat > build/release-notes.md <<EOF
          ### Install with Homebrew

          \`\`\`sh
          brew install --cask erwinzhang7/ajar/ajar
          \`\`\`

          (Requires the [erwinzhang7/homebrew-ajar](https://github.com/erwinzhang7/homebrew-ajar) tap. The cask formula for this release is below — drop it into that tap to publish.)

          ### Or grab the zip directly

          Download \`Ajar-${{ steps.tag.outputs.version }}.zip\` below, unzip it, drag \`Ajar.app\` into \`/Applications\`, and enable the extension in **System Settings → General → Login Items & Extensions → Quick Look → Ajar**.

          If macOS blocks first launch with "Apple cannot check it for malicious software," clear the quarantine flag once:

          \`\`\`sh
          xattr -cr /Applications/Ajar.app
          \`\`\`

          Then press Space on a folder in Finder.

          ### Homebrew Cask formula for this release

          \`\`\`ruby
          cask "ajar" do
            version "${{ steps.tag.outputs.version }}"
            sha256 "${{ steps.artifact.outputs.sha }}"
            url "https://github.com/erwinzhang7/Ajar/releases/download/v#{version}/Ajar-#{version}.zip"
            name "Ajar"
            desc "Folder and archive previews for macOS Quick Look"
            homepage "https://github.com/erwinzhang7/Ajar"
            app "Ajar.app"
          end
          \`\`\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --title "Ajar ${{ steps.tag.outputs.name }}" \
            --notes-file build/release-notes.md \
            "${{ steps.artifact.outputs.path }}#Ajar.app — ad-hoc signed zip"
